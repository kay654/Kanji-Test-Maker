<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="漢字テスト作成">
  <title>漢字テスト作成</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img class="brand-mark" src="icon.svg" alt="" aria-hidden="true">
      <div>
        <h1>漢字テスト作成</h1>
        <p>書き取りテストをかんたんに作ろう！</p>
      </div>
    </div>
    <button type="button" class="btn-outline btn-reset" id="resetButton">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.5l9.6-9.6c1-1 2.5-1 3.5 0l5.5 5.5c1 1 1 2.5 0 3.5L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
      リセット
    </button>
  </header>

  <main class="app-shell">
    <section class="controls" aria-label="問題入力">
      <div class="panel">
        <div class="panel-title">
          <span class="step">1</span>
          <h2>問題を入力</h2>
        </div>

        <div class="entry-headings" aria-hidden="true">
          <span></span>
          <span>問題文</span>
          <span>問題の漢字</span>
          <span>よみがな</span>
          <span></span>
        </div>
        <div class="entry-list" id="entryList"></div>
        <p class="visually-hidden" id="reorderStatus" aria-live="polite"></p>

        <div class="entry-actions">
          <button type="button" class="btn-add" id="addButton">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
            追加する
          </button>
          <button type="button" class="btn-generate" id="openRandomButton">
            ランダム生成
          </button>
          <button type="button" class="btn-select" id="openKanjiSelectButton">
            漢字から選ぶ
          </button>
          <button type="button" class="btn-data" id="openDataButton">
            インポート・エクスポート
          </button>
        </div>
      </div>
    </section>

    <section class="preview-wrap" aria-label="プリントプレビュー">
      <div class="preview-panel">
        <div class="preview-toolbar">
          <div class="panel-title">
            <span class="step">2</span>
            <h2>プレビュー</h2>
            <div class="preview-zoom-controls" role="group" aria-label="プレビューの表示倍率">
              <button type="button" class="btn-zoom" id="zoomOutButton" aria-label="プレビューを縮小" disabled>−</button>
              <button type="button" class="btn-zoom" id="zoomInButton" aria-label="プレビューを拡大">＋</button>
            </div>
          </div>
          <div class="preview-actions">
            <button type="button" class="btn-history" id="openHistoryButton">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path><path d="M12 7v5l3 2"></path></svg>
              履歴
            </button>
            <button type="button" class="btn-toggle-answer" id="answerToggleButton" aria-pressed="false">
              答え表示
            </button>
            <button type="button" class="btn-blue" id="printButton">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V3h12v6"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><path d="M6 14h12v7H6z"></path></svg>
              印刷する
            </button>
          </div>
        </div>
        <div class="preview-stage" id="previewStage"></div>
      </div>
    </section>
  </main>

  <div class="print-root" id="printRoot" aria-hidden="true"></div>

  <div class="modal-overlay" id="historyModal" hidden>
    <div class="history-dialog" role="dialog" aria-modal="true" aria-labelledby="historyDialogTitle">
      <header class="dialog-header">
        <h2 id="historyDialogTitle">印刷履歴</h2>
        <button type="button" class="dialog-close" id="closeHistoryButton" aria-label="閉じる">×</button>
      </header>

      <p class="history-help" id="historyHelp">印刷した問題を新しい順に最大100件保存します。</p>
      <div class="history-list" id="historyList" aria-label="印刷履歴の一覧"></div>
      <p class="dialog-message history-message" id="historyMessage" aria-live="polite"></p>

      <footer class="dialog-footer">
        <button type="button" class="btn-dialog-cancel" id="cancelHistoryButton">キャンセル</button>
        <button type="button" class="btn-dialog-add" id="restoreHistoryButton" disabled>復元する</button>
      </footer>
    </div>
  </div>

  <div class="modal-overlay" id="kanjiSelectModal" hidden>
    <div class="kanji-select-dialog" role="dialog" aria-modal="true" aria-labelledby="kanjiSelectDialogTitle">
      <header class="dialog-header">
        <h2 id="kanjiSelectDialogTitle">漢字から問題を選ぶ</h2>
        <button type="button" class="dialog-close" id="closeKanjiSelectButton" aria-label="閉じる">×</button>
      </header>

      <section class="dialog-section">
        <label class="kanji-search-field">
          <span>問題にしたい漢字</span>
          <input type="text" id="kanjiSelectInput" autocomplete="off" spellcheck="false" aria-describedby="kanjiSelectHelp">
        </label>
        <p class="kanji-select-help" id="kanjiSelectHelp">検索する漢字が1字になると、選べる例文を表示します。</p>
      </section>

      <p class="dialog-message kanji-select-message" id="kanjiSelectMessage" aria-live="polite"></p>
      <div class="kanji-choice-list" id="kanjiChoiceList" aria-label="例文の候補"></div>

      <footer class="dialog-footer">
        <span class="kanji-choice-note">例文を選ぶと問題一覧に追加されます。</span>
        <button type="button" class="btn-dialog-cancel" id="cancelKanjiSelectButton">キャンセル</button>
      </footer>
    </div>
  </div>

  <div class="modal-overlay" id="randomModal" hidden>
    <div class="random-dialog" role="dialog" aria-modal="true" aria-labelledby="randomDialogTitle">
      <header class="dialog-header">
        <h2 id="randomDialogTitle">ランダム生成</h2>
        <button type="button" class="dialog-close" id="closeRandomButton" aria-label="閉じる">×</button>
      </header>

      <section class="dialog-section" aria-label="学年">
        <p class="dialog-label">学年</p>
        <div class="grade-options" id="gradeOptions">
          <label><input type="radio" name="randomGrade" value="1" checked>1年</label>
          <label><input type="radio" name="randomGrade" value="2">2年</label>
          <label><input type="radio" name="randomGrade" value="3">3年</label>
          <label><input type="radio" name="randomGrade" value="4">4年</label>
          <label><input type="radio" name="randomGrade" value="5">5年</label>
          <label><input type="radio" name="randomGrade" value="6">6年</label>
        </div>
      </section>

      <section class="dialog-section" aria-label="生成する問題数">
        <label class="count-field">
          <span>生成する問題数</span>
          <input type="number" id="randomCountInput" value="24" min="1" max="48" step="1">
        </label>
      </section>

      <section class="dialog-section" aria-label="生成方法">
        <p class="dialog-label">生成方法</p>
        <div class="random-mode-options">
          <label><input type="radio" name="randomMode" value="replace" checked>現在の問題を置き換える</label>
          <label><input type="radio" name="randomMode" value="append">現在の問題に追加する</label>
        </div>
      </section>

      <p class="dialog-message" id="randomMessage" aria-live="polite"></p>

      <footer class="dialog-footer">
        <button type="button" class="btn-dialog-cancel" id="cancelRandomButton">キャンセル</button>
        <button type="button" class="btn-dialog-add" id="generateRandomButton">生成する</button>
      </footer>
    </div>
  </div>

  <div class="modal-overlay" id="csvModal" hidden>
    <div class="csv-dialog" role="dialog" aria-modal="true" aria-labelledby="csvDialogTitle">
      <header class="dialog-header">
        <h2 id="csvDialogTitle">インポート・エクスポート</h2>
        <button type="button" class="dialog-close" id="closeCsvButton" aria-label="閉じる">×</button>
      </header>

      <section class="dialog-section">
        <label class="csv-field">
          <span>CSVテキストを貼り付けてインポートできます。</span>
          <textarea id="csvTextArea" spellcheck="false"></textarea>
        </label>
        <p class="csv-note">形式: 問題文,問題の漢字,よみがな,全文の読み（任意）</p>
      </section>

      <p class="dialog-message" id="csvMessage" aria-live="polite"></p>

      <footer class="dialog-footer">
        <button type="button" class="btn-dialog-cancel" id="cancelCsvButton">閉じる</button>
        <button type="button" class="btn-dialog-cancel" id="downloadCsvButton">ダウンロード</button>
        <button type="button" class="btn-dialog-add" id="importCsvButton">インポート</button>
      </footer>
    </div>
  </div>

  <script src="data/kanji-writing-questions.js"></script>
  <script src="app.js?v=2" defer></script>
</body>
</html>
